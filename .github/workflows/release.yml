name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_release: ${{ steps.meta.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          is_release="false"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${tag}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${tag}" >&2
              exit 1
            fi
            is_release="true"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"

  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run bundle:web

      - name: Upload web bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: nodetrace-web-bundle
          path: release/web/Nodetrace-Web-v${{ needs.validate.outputs.version }}.zip
          if-no-files-found: error

  build-installers:
    name: Build ${{ matrix.label }} installer
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            build_command: npx electron-builder --win nsis --publish never
            final_name: Nodetrace-Windows-x64-v${{ needs.validate.outputs.version }}.exe
            artifact_name: nodetrace-windows-installer
            artifact_glob: release/*.exe
          - os: macos-latest
            label: macOS
            build_command: npx electron-builder --mac dmg --publish never
            final_name: Nodetrace-macOS-arm64-v${{ needs.validate.outputs.version }}.dmg
            artifact_name: nodetrace-macos-installer
            artifact_glob: release/*.dmg

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:web && ${{ matrix.build_command }}

      - name: Normalize artifact filename
        run: |
          shopt -s nullglob
          files=( ${{ matrix.artifact_glob }} )
          if [[ "${#files[@]}" -ne 1 ]]; then
            echo "Expected exactly one installer artifact, found ${#files[@]}" >&2
            printf '%s\n' "${files[@]}"
            exit 1
          fi
          mv "${files[0]}" "release/${{ matrix.final_name }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.final_name }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-web
      - build-installers
    if: needs.validate.outputs.is_release == 'true'
    steps:
      - name: Download web bundle
        uses: actions/download-artifact@v5
        with:
          name: nodetrace-web-bundle
          path: release-assets

      - name: Download Windows installer
        uses: actions/download-artifact@v5
        with:
          name: nodetrace-windows-installer
          path: release-assets

      - name: Download macOS installer
        uses: actions/download-artifact@v5
        with:
          name: nodetrace-macos-installer
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Nodetrace $RELEASE_TAG" \
              --generate-notes
          fi
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
