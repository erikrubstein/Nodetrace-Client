name: Test Installers

on:
  workflow_dispatch:
  push:
    branches:
      - test/github-actions-installers

jobs:
  build-installers:
    name: Build ${{ matrix.label }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            npm_script: dist:win
            artifact_name: nodetrace-windows-installer
          - os: macos-latest
            label: macOS
            npm_script: dist:mac
            artifact_name: nodetrace-macos-installer

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.npm_script }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*
          if-no-files-found: error
