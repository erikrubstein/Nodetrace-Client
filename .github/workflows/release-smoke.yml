name: Release Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - workflow/**

permissions:
  contents: read

jobs:
  web-bundle:
    name: Build Web Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Archive dist bundle
        run: |
          cd dist
          zip -r ../nodetrace-web-${{ github.sha }}.zip .

      - name: Upload web bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodetrace-web-bundle
          path: nodetrace-web-${{ github.sha }}.zip

  desktop-smoke:
    name: Desktop Smoke (macOS)
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Lint desktop code
        run: npm run lint:desktop

  macos-installer:
    name: macOS DMG Smoke
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run dist:mac

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodetrace-macos-installer
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml

  windows-installer:
    name: Windows Installer Smoke
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodetrace-windows-installer
          path: |
            release/*.exe
            release/*.yml
