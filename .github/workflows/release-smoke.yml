name: Release Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - workflow/**

permissions:
  contents: read

jobs:
  web-bundle:
    name: Build Web Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Archive dist bundle
        run: |
          cd dist
          zip -r ../nodetrace-web-${{ github.sha }}.zip .

      - name: Upload web bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodetrace-web-bundle
          path: nodetrace-web-${{ github.sha }}.zip

  desktop-smoke:
    name: Desktop Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Lint desktop code
        run: npm run lint:desktop
